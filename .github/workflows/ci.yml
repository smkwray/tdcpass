name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPYCACHEPREFIX: /tmp/tdcpass-pycache
      PYTEST_ADDOPTS: -p no:cacheprovider
      UV_CACHE_DIR: /tmp/uv-cache-tdcpass
      RUFF_CACHE_DIR: /tmp/ruff-cache-tdcpass
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e '.[dev]'

      - name: Doctor
        run: python -B -m tdcpass doctor

      - name: Demo smoke
        run: python -B -m tdcpass demo

      - name: Tests
        run: python -B -m pytest -q
