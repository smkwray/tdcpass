shocks:
  unexpected_tdc_default:
    target: tdc_bank_only_qoq
    method: rolling_window_ridge
    model_name: unexpected_tdc_default
    freeze_status: frozen
    ridge_alpha: 125.0
    quality_gate:
      min_usable_observations: 60
      min_shock_target_correlation: 0.5
      max_flagged_share: 0.2
      max_realized_scale_ratio_p95: 25.0
      max_realized_scale_ratio_p99: 100.0
      max_initial_train_to_usable_volatility_ratio: 2.0
    min_train_obs: 24
    max_train_obs: 40
    predictors:
    - lag_tdc_bank_only_qoq
    - lag_fedfunds
    - lag_unemployment
    - lag_inflation
    standardize_residual: true
    max_condition_number: 1000000
    max_scale_ratio: 5
    residual_column: tdc_residual
    standardized_column: tdc_residual_z
    fitted_column: tdc_fitted
    train_start_obs_column: train_start_obs
    train_target_scale_ratio_column: fitted_to_train_target_sd_ratio
